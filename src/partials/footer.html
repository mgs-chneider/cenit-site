  <!-- ==========================================================
       Klaro! Cookie-Consent-Manager (Open Source, MIT-lizenziert)
       Gate: Google Analytics 4 lädt erst nach Einwilligung
       ("google-analytics"-Service), Infogram-Grafiken auf
       Zahlen & Fakten laden automatisch, sobald "infogram"
       zugestimmt wurde (siehe main.js: autoLoadAllInfogramEmbeds).
  ========================================================== -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/klaro@0.7/dist/klaro.min.css" />
  <style>
    /* Klaro an CENIT-Farbwelt anpassen (Purple/Gold statt Standard-Grün/Grau) */
    :root {
      --green1: var(--cenit-purple, #4b2e83);
      --green2: var(--cenit-purple, #4b2e83);
      --green3: #ffffff;
      --dark1: var(--cenit-purple, #4b2e83);
    }
    .klaro .cookie-notice .cn-buttons .cm-btn.cm-btn-success,
    .klaro .cm-modal .cm-btn.cm-btn-success {
      background-color: var(--cenit-purple, #4b2e83) !important;
      border-color: var(--cenit-purple, #4b2e83) !important;
    }
    .klaro .cookie-notice .cn-buttons .cm-btn.cm-btn-success:hover,
    .klaro .cm-modal .cm-btn.cm-btn-success:hover {
      background-color: var(--cenit-gold, #b8964f) !important;
      border-color: var(--cenit-gold, #b8964f) !important;
    }
  </style>
  <script>
    window.klaroConfig = {
      version: 1,
      elementID: 'klaro',
      styling: { theme: ['light', 'bottom', 'wide'] },
      default: false,
      mustConsent: false,
      acceptAll: true,
      hideDeclineAll: false,
      lang: (document.documentElement.lang === 'en') ? 'en' : 'de',

      translations: {
        de: {
          consentModal: {
            title: 'Datenschutzeinstellungen',
            description: 'Wir nutzen auf dieser Seite einzelne Dienste, die personenbezogene Daten verarbeiten können. Sie entscheiden selbst, welche Sie zulassen – die Auswahl können Sie hier jederzeit wieder ändern.'
          },
          consentNotice: {
            description: 'Wir verwenden Google Analytics zur anonymisierten Reichweitenmessung und binden interaktive Grafiken von Infogram ein. Beides lädt erst nach Ihrer Zustimmung.',
            learnMore: 'Einstellungen',
            privacyPolicy: { name: 'Datenschutzerklärung', text: 'Mehr in unserer {privacyPolicy}.' }
          },
          acceptAll: 'Alle akzeptieren',
          acceptSelected: 'Auswahl akzeptieren',
          decline: 'Ablehnen',
          close: 'Schließen',
          purposes: {
            statistics: 'Statistik',
            content: 'Externe Inhalte'
          },
          'google-analytics': {
            title: 'Google Analytics',
            description: 'Anonymisierte Auswertung der Website-Nutzung (Google Ireland Limited).'
          },
          infogram: {
            title: 'Infogram',
            description: 'Interaktive Grafiken zur Darstellung von Studiendaten auf „Zahlen & Fakten" (Infogram Inc.).'
          }
        },
        en: {
          consentModal: {
            title: 'Privacy settings',
            description: 'We use a small number of services on this site that may process personal data. You decide which ones to allow – you can change your choice here at any time.'
          },
          consentNotice: {
            description: 'We use Google Analytics for anonymised traffic analysis and embed interactive charts from Infogram. Both only load after your consent.',
            learnMore: 'Settings',
            privacyPolicy: { name: 'Privacy Policy', text: 'Find out more in our {privacyPolicy}.' }
          },
          acceptAll: 'Accept all',
          acceptSelected: 'Accept selection',
          decline: 'Decline',
          close: 'Close',
          purposes: {
            statistics: 'Statistics',
            content: 'External content'
          },
          'google-analytics': {
            title: 'Google Analytics',
            description: 'Anonymised analysis of website usage (Google Ireland Limited).'
          },
          infogram: {
            title: 'Infogram',
            description: 'Interactive charts used to display study data on "Facts & Figures" (Infogram Inc.).'
          }
        }
      },

      services: [
        {
          name: 'google-analytics',
          title: 'Google Analytics',
          purposes: ['statistics'],
          cookies: [/^_ga/, '_gid', /^_gat/],
          default: false,
          onlyOnce: true
        },
        {
          name: 'infogram',
          title: 'Infogram',
          purposes: ['content'],
          default: false,
          onlyOnce: false,
          callback: function (consent, service) {
            if (consent && typeof window.autoLoadAllInfogramEmbeds === 'function') {
              window.autoLoadAllInfogramEmbeds();
            }
          }
        }
      ]
    };
  </script>
  <script defer type="text/javascript" data-config="klaroConfig" src="https://cdn.jsdelivr.net/npm/klaro@0.7/dist/klaro.js"></script>

  <!-- Google tag (gtag.js) – lädt erst nach Klaro-Einwilligung für "google-analytics" -->
  <script type="text/plain" data-type="application/javascript" data-name="google-analytics" data-src="https://www.googletagmanager.com/gtag/js?id=G-SP90GD9T33"></script>
  <script type="text/plain" data-type="application/javascript" data-name="google-analytics">
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-SP90GD9T33');
  </script>
